{% load static %}

<h1>{{ object.titulo }}</h1>
<p>{{ object.preco }}</p>
<p> {{ object.descricao }}</p>
<p>{{ object.quantidade }}</p>
{% if object.foto == "" or object.foto == null %}
<img src="" alt="Imagem">
{% else %}
<img src="{{ object.foto.url }}" alt="Imagem" width="10%">
{%endif%}
<span>{{produto.produto_em_estoque}}</span>

<a href="{% url 'produtos-update' produto.slug %}">Editar</a>
<a href="{% url 'produtos-delete' produto.slug %}">Excluir</a>
