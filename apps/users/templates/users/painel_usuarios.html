<h1>Usuários</h1>
<ul>
{% for user in object_list %}
    <a href="{% url 'usuarios-detail' user.id %}">
        <li>{{ user.username }}
            <a href="{% url 'usuarios-update' user.id %}">Editar</a>
        </li></a>
{% empty %}
    <li>No users yet</li>
{% endfor %}

<a href="{% url 'cadastro' %}">Cadastrar usuario</a>

<form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">logout</button>
</form>


</ul>
